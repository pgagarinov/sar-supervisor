# Supervisor Harness Configuration
# Domain-specific values below — supervisor code reads these generically.

[project]
name = "sar-supervisor"

[supervised]
repo = "../sar-research-loop"
default_prompt = "/start"
skill_name = "start"
agents = ["evaluator", "improver"]

[reports]
primary = "{tmp}/rag-eval-report.json"

[reports.metric]
report = "primary"
field = "recall_at_5"
direction = "maximize"

[log]
path = "{tmp}/cc-{name}.log"

[phases]
sequence = ["E", "I"]
labels = { E = "evaluate", I = "improve" }
markers = { E = "Running evaluation", I = "Improving" }

[revert]
paths = ["src/", "tests/"]

[stop_hook]
sleep_seconds = 120

[experiments]
max_concurrent = 3
id_prefix = "exp"
